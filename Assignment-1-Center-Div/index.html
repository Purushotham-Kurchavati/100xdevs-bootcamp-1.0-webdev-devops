<!DOCTYPE html>
<html>
<head>
    <title>llElevenLabs | Signup</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="index.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;800&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Top Logo -->
    <div class="top">
        <h3>llElevenLabs</h3>
    </div>

    <br/><br/><br/><br/><br/><br/>

    <!-- Heading -->
    <div class="top">
        <h1>Create an account</h1>
    </div>

    <!-- Google Button -->
    <div class="google-btn">
        <img src="/Users/purushothamrj/Desktop/devcode/100xDevs/html-css-foundations/assets:icons:google.svg" alt="Google">
        <span>Sign up with Google</span>
    </div>

    <!-- Divider -->
    <hr class="divider">

    <!-- Email -->
    <div class="input-group">
        <label>Email</label>
        <input type="email">
    </div>

    <!-- Password -->
    <div class="input-group">
        <label>Password</label>

        <div class="password-box">
            <input type="password" id="password">
            <span class="eye" onclick="togglePassword()">👁️</span>
        </div>
    </div>

    <!-- Sign Up Button -->
    <button class="signup-btn">Sign up</button>

    <!-- Login Text -->
    <p class="login-text">
        Already registered? <a href="#">Sign in</a>
    </p>

    <!-- Terms -->
    <p class="terms-text">
        By continuing, you agree to our 
        <a href="#">Terms of Service</a> and 
        <a href="#">Privacy Policy</a>.
    </p>

</body>
</html>
